server {
    listen 80;
    server_name rgs.rktgrading.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rgs.rktgrading.com;

    ssl_certificate /etc/letsencrypt/live/rgs.rktgrading.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rgs.rktgrading.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for card images)
    client_max_body_size 50M;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Static assets — no cache during development, force revalidation
    location /static/ {
        proxy_pass http://127.0.0.1:8741;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Proxy to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8741;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support (for future agent WebSocket bridge)
    location /ws {
        proxy_pass http://127.0.0.1:8741;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
