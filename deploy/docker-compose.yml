version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8741:8741"
    env_file:
      - ../.env
    environment:
      - RKT_MODE=cloud
      - RKT_DB_URL=postgresql://rkt:rkt_password@db:5432/rkt_grading
      - RKT_ENV=production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rkt
      POSTGRES_PASSWORD: rkt_password
      POSTGRES_DB: rkt_grading
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rkt"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  app_data:
